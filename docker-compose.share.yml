# Use after: docker load -i tarrlok-images.tar
# No build step — images must already exist locally with these tags.

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-tarrlok}
      MYSQL_USER: ${MYSQL_USER:-tarrlok}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-tarrlok}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s

  blockchain:
    image: tarrlok-blockchain:demo
    restart: unless-stopped
    ports:
      - "${BLOCKCHAIN_PORT:-8545}:8545"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8545',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({jsonrpc:'2.0',method:'eth_blockNumber',params:[],id:1})}).then(r=>r.json()).then(j=>process.exit(j.result?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s

  app:
    image: tarrlok-app:demo
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      blockchain:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      APP_NAME: Tarrlok
      APP_ENV: local
      APP_KEY: ${APP_KEY:-base64:2fl+K+k3lFYf+vRmYgXKWG0LhCdFPmFsO1HPdR7iKmk=}
      APP_DEBUG: "true"
      APP_URL: http://localhost:${APP_PORT:-8080}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_DATABASE: ${MYSQL_DATABASE:-tarrlok}
      DB_USERNAME: ${MYSQL_USER:-tarrlok}
      DB_PASSWORD: ${MYSQL_PASSWORD:-tarrlok}
      SESSION_DRIVER: database
      SESSION_SECURE_COOKIE: "false"
      QUEUE_CONNECTION: sync
      CACHE_STORE: database
      MAIL_MAILER: log
      BLOCKCHAIN_ENABLED: "true"
      BLOCKCHAIN_RPC_URL: http://blockchain:8545
      BLOCKCHAIN_PRIVATE_KEY: "0xac0974bec39a17e36ba4a6b4d3255bf239959da31d71ebff6b2c5c3f809b40"
      TARRLOK_ADMIN_EMAIL: admin@tarrlok.gh
      TARRLOK_ADMIN_PASSWORD: TarrlokAdmin2024!
      TARRLOK_ADMIN_NAME: "Tarrlok Platform Admin"
    volumes:
      - tarrlok_storage:/app/tarrlok/storage

volumes:
  mysql_data:
  tarrlok_storage:
